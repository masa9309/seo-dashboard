<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOダッシュボード | morinotakumi.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      line-height: 1.5;
    }

    /* ── ヘッダー ── */
    .header {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .header .site-url {
      font-size: 13px;
      color: #666;
    }
    .header .fetched-at {
      margin-left: auto;
      font-size: 12px;
      color: #999;
    }

    /* ── サマリーカード ── */
    .summary-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      gap: 32px;
    }
    .summary-card {
      text-align: center;
    }
    .summary-card .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .summary-card .sub {
      font-size: 11px;
      color: #aaa;
    }

    /* ── タブ ── */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 24px;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active {
      color: #0066cc;
      border-bottom-color: #0066cc;
    }

    /* ── コンテンツ ── */
    .content {
      padding: 24px;
      max-width: 1200px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── セクションタイトル ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }
    .period-note {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    /* ── テーブル共通 ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .data-table thead th {
      background: #f8f8f8;
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    .data-table thead th.num { text-align: right; }
    .data-table tbody tr:hover { background: #fafafa; }
    .data-table tbody td {
      padding: 8px 14px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      color: #1a1a1a;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #333;
    }
    .data-table tbody td.rank {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-good  { color: #2e7d32; font-weight: 600; }
    .rank-mid   { color: #f57c00; font-weight: 600; }
    .rank-low   { color: #999; }

    /* ── デイリーテーブル ── */
    .daily-wrap {
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
    }
    .daily-wrap .data-table { border: none; }

    /* ── URL列 ── */
    .url-cell {
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url-cell a {
      color: #0066cc;
      text-decoration: none;
    }
    .url-cell a:hover { text-decoration: underline; }

    /* ── エラー表示 ── */
    .error-box {
      background: #fff3f3;
      border: 1px solid #ffcccc;
      border-radius: 6px;
      padding: 16px;
      color: #c00;
      font-size: 13px;
    }

    /* ── ローディング ── */
    #loading {
      padding: 60px 24px;
      text-align: center;
      color: #888;
      font-size: 15px;
    }
    #dashboard { display: none; }

    /* ── ランク色バー ── */
    .bar-wrap {
      display: inline-block;
      width: 60px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #0066cc;
    }
  </style>
</head>
<body>

<div id="loading">データを読み込み中...</div>

<div id="dashboard">
  <div class="header">
    <h1>SEOダッシュボード</h1>
    <span class="site-url">morinotakumi.com</span>
    <span class="fetched-at" id="fetched-at"></span>
  </div>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab1', this)">① 流入・セッション（GA4）</button>
    <button class="tab-btn" onclick="switchTab('tab2', this)">② 検索キーワード（SC）</button>
    <button class="tab-btn" onclick="switchTab('tab3', this)">③ 記事別パフォーマンス（SC）</button>
  </div>

  <div class="content">
    <!-- TAB 1 -->
    <div class="tab-panel active" id="tab1">
      <div id="tab1-content"></div>
    </div>

    <!-- TAB 2 -->
    <div class="tab-panel" id="tab2">
      <div id="tab2-content"></div>
    </div>

    <!-- TAB 3 -->
    <div class="tab-panel" id="tab3">
      <div id="tab3-content"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────
function fmt(n) {
  return Number(n).toLocaleString("ja-JP");
}
function rankClass(pos) {
  if (pos <= 10) return "rank-good";
  if (pos <= 20) return "rank-mid";
  return "rank-low";
}

// ─────────────────────────────────────────
// タブ切替
// ─────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

// ─────────────────────────────────────────
// サマリーカード
// ─────────────────────────────────────────
function renderSummary(ga4) {
  const s = ga4.summary || {};
  const bar = document.getElementById("summary-bar");
  bar.innerHTML = `
    <div class="summary-card">
      <div class="label">セッション</div>
      <div class="value">${fmt(s.sessions || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
    <div class="summary-card">
      <div class="label">ユーザー</div>
      <div class="value">${fmt(s.users || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
    <div class="summary-card">
      <div class="label">ページビュー</div>
      <div class="value">${fmt(s.pv || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
  `;
}

// ─────────────────────────────────────────
// タブ① GA4 デイリー
// ─────────────────────────────────────────
function renderTab1(ga4) {
  const el = document.getElementById("tab1-content");
  if (ga4.error) {
    el.innerHTML = `<div class="error-box">⚠️ GA4 取得エラー：${ga4.error}</div>`;
    return;
  }
  const rows = (ga4.daily || []).slice().reverse();
  const maxPv = Math.max(...rows.map(r => r.pv), 1);

  let html = `
    <p class="period-note">期間：過去28日間 ／ 日付の新しい順</p>
    <div class="daily-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>日付</th>
          <th class="num">セッション</th>
          <th class="num">ユーザー</th>
          <th class="num">ページビュー</th>
        </tr>
      </thead>
      <tbody>
  `;
  rows.forEach(r => {
    const barW = Math.round((r.pv / maxPv) * 60);
    html += `
      <tr>
        <td>${r.date}</td>
        <td class="num">${fmt(r.sessions)}</td>
        <td class="num">${fmt(r.users)}</td>
        <td class="num">
          ${fmt(r.pv)}
          <span class="bar-wrap"><span class="bar-fill" style="width:${barW}px"></span></span>
        </td>
      </tr>
    `;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ② SC キーワード
// ─────────────────────────────────────────
function renderTab2(sc) {
  const el = document.getElementById("tab2-content");
  if (sc.error) {
    el.innerHTML = `<div class="error-box">⚠️ Search Console 取得エラー：${sc.error}</div>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${sc.period} ／ クリック数降順・上位50件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>キーワード</th>
          <th class="num">クリック</th>
          <th class="num">表示回数</th>
          <th class="num">CTR</th>
          <th class="num">平均順位</th>
        </tr>
      </thead>
      <tbody>
  `;
  sc.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td>${escHtml(r.keyword)}</td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank ${rankClass(r.position)}">${r.position}</td>
      </tr>
    `;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ③ SC ページ別
// ─────────────────────────────────────────
function renderTab3(sc) {
  const el = document.getElementById("tab3-content");
  if (sc.error) {
    el.innerHTML = `<div class="error-box">⚠️ Search Console 取得エラー：${sc.error}</div>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${sc.period} ／ クリック数降順・上位50件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>URL</th>
          <th class="num">クリック</th>
          <th class="num">表示回数</th>
          <th class="num">CTR</th>
          <th class="num">平均順位</th>
        </tr>
      </thead>
      <tbody>
  `;
  sc.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td class="url-cell"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.path)}</a></td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank ${rankClass(r.position)}">${r.position}</td>
      </tr>
    `;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// XSS対策
// ─────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
