<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEOダッシュボード | morinotakumi.com</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      line-height: 1.5;
    }

    /* ── ヘッダー ── */
    .header {
      background: #fff;
      border-bottom: 2px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .header .site-url {
      font-size: 13px;
      color: #666;
    }
    .header .fetched-at {
      margin-left: auto;
      font-size: 12px;
      color: #999;
    }

    /* ── サマリーカード ── */
    .summary-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      gap: 32px;
    }
    .summary-card {
      text-align: center;
    }
    .summary-card .label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.2;
    }
    .summary-card .sub {
      font-size: 11px;
      color: #aaa;
    }

    /* ── タブ ── */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 24px;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover { color: #333; }
    .tab-btn.active {
      color: #0066cc;
      border-bottom-color: #0066cc;
    }

    /* ── コンテンツ ── */
    .content {
      padding: 24px;
      max-width: 1200px;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── セクションタイトル ── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 12px;
    }
    .period-note {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    /* ── テーブル共通 ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .data-table thead th {
      background: #f8f8f8;
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      border-bottom: 1px solid #e0e0e0;
      white-space: nowrap;
    }
    .data-table thead th.num { text-align: right; }
    .data-table tbody tr:hover { background: #fafafa; }
    .data-table tbody td {
      padding: 8px 14px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
      color: #1a1a1a;
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #333;
    }
    .data-table tbody td.rank {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-good  { color: #2e7d32; font-weight: 600; }
    .rank-mid   { color: #f57c00; font-weight: 600; }
    .rank-low   { color: #999; }

    /* ── デイリーテーブル ── */
    .daily-wrap {
      max-height: 480px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
    }
    .daily-wrap .data-table { border: none; }

    /* ── URL列 ── */
    .url-cell {
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url-cell a {
      color: #0066cc;
      text-decoration: none;
    }
    .url-cell a:hover { text-decoration: underline; }

    /* ── エラー表示 ── */
    .error-box {
      background: #fff3f3;
      border: 1px solid #ffcccc;
      border-radius: 6px;
      padding: 16px;
      color: #c00;
      font-size: 13px;
    }

    /* ── ローディング ── */
    #loading {
      padding: 60px 24px;
      text-align: center;
      color: #888;
      font-size: 15px;
    }
    #dashboard { display: none; }

    /* ── ランク色バー ── */
    .bar-wrap {
      display: inline-block;
      width: 60px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      vertical-align: middle;
      margin-left: 6px;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #0066cc;
    }

    /* ── インデックス状態バッジ ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-ok   { background: #e8f5e9; color: #2e7d32; }
    .badge-warn { background: #fff8e1; color: #f57c00; }
    .badge-err  { background: #fce4ec; color: #c62828; }
    .badge-unknown { background: #f5f5f5; color: #888; }

    /* ── カニバリ詳細行 ── */
    .cannibal-pages { padding: 0; }
    .cannibal-page-row {
      display: flex;
      gap: 12px;
      padding: 4px 14px 4px 28px;
      font-size: 12px;
      color: #555;
      border-top: 1px solid #f0f0f0;
    }
    .cannibal-page-row .cp-path { flex: 1; color: #0066cc; }
    .cannibal-page-row .cp-num  { min-width: 60px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── 展開ボタン ── */
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #0066cc;
      font-size: 12px;
      padding: 0;
    }
    .expand-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="loading">データを読み込み中...</div>

<div id="dashboard">
  <div class="header">
    <h1>SEOダッシュボード</h1>
    <span class="site-url">morinotakumi.com</span>
    <span class="fetched-at" id="fetched-at"></span>
  </div>

  <div class="summary-bar" id="summary-bar"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tab1', this)">① 流入・セッション（GA4）</button>
    <button class="tab-btn" onclick="switchTab('tab2', this)">② 検索キーワード（SC）</button>
    <button class="tab-btn" onclick="switchTab('tab3', this)">③ 記事別パフォーマンス（SC）</button>
    <button class="tab-btn" onclick="switchTab('tab4', this)">④ ページ別・インデックス状態</button>
    <button class="tab-btn" onclick="switchTab('tab5', this)">⑤ カニバリ検出</button>
    <button class="tab-btn" onclick="switchTab('tab6', this)">⑥ 2ページ目滞留KW</button>
    <button class="tab-btn" onclick="switchTab('tab7', this)">⑦ 内部リンク構造</button>
  </div>

  <div class="content">
    <!-- TAB 1 -->
    <div class="tab-panel active" id="tab1">
      <div id="tab1-content"></div>
    </div>

    <!-- TAB 2 -->
    <div class="tab-panel" id="tab2">
      <div id="tab2-content"></div>
    </div>

    <!-- TAB 3 -->
    <div class="tab-panel" id="tab3">
      <div id="tab3-content"></div>
    </div>

    <!-- TAB 4 -->
    <div class="tab-panel" id="tab4">
      <div id="tab4-content"></div>
    </div>

    <!-- TAB 5 -->
    <div class="tab-panel" id="tab5">
      <div id="tab5-content"></div>
    </div>

    <!-- TAB 6 -->
    <div class="tab-panel" id="tab6">
      <div id="tab6-content"></div>
    </div>

    <!-- TAB 7 -->
    <div class="tab-panel" id="tab7">
      <div id="tab7-content"></div>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// ユーティリティ
// ─────────────────────────────────────────
function fmt(n) {
  return Number(n).toLocaleString("ja-JP");
}
function rankClass(pos) {
  if (pos <= 10) return "rank-good";
  if (pos <= 20) return "rank-mid";
  return "rank-low";
}

// ─────────────────────────────────────────
// タブ切替
// ─────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

// ─────────────────────────────────────────
// サマリーカード
// ─────────────────────────────────────────
function renderSummary(ga4) {
  const s = ga4.summary || {};
  const bar = document.getElementById("summary-bar");
  bar.innerHTML = `
    <div class="summary-card">
      <div class="label">セッション</div>
      <div class="value">${fmt(s.sessions || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
    <div class="summary-card">
      <div class="label">ユーザー</div>
      <div class="value">${fmt(s.users || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
    <div class="summary-card">
      <div class="label">ページビュー</div>
      <div class="value">${fmt(s.pv || 0)}</div>
      <div class="sub">過去28日間</div>
    </div>
  `;
}

// ─────────────────────────────────────────
// タブ① GA4 デイリー
// ─────────────────────────────────────────
function renderTab1(ga4) {
  const el = document.getElementById("tab1-content");
  if (ga4.error) {
    el.innerHTML = `<div class="error-box">⚠️ GA4 取得エラー：${ga4.error}</div>`;
    return;
  }
  const rows = (ga4.daily || []).slice().reverse();
  const maxPv = Math.max(...rows.map(r => r.pv), 1);

  let html = `
    <p class="period-note">期間：過去28日間 ／ 日付の新しい順</p>
    <div class="daily-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>日付</th>
          <th class="num">セッション</th>
          <th class="num">ユーザー</th>
          <th class="num">ページビュー</th>
        </tr>
      </thead>
      <tbody>
  `;
  rows.forEach(r => {
    const barW = Math.round((r.pv / maxPv) * 60);
    html += `
      <tr>
        <td>${r.date}</td>
        <td class="num">${fmt(r.sessions)}</td>
        <td class="num">${fmt(r.users)}</td>
        <td class="num">
          ${fmt(r.pv)}
          <span class="bar-wrap"><span class="bar-fill" style="width:${barW}px"></span></span>
        </td>
      </tr>
    `;
  });
  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ② SC キーワード
// ─────────────────────────────────────────
function renderTab2(sc) {
  const el = document.getElementById("tab2-content");
  if (sc.error) {
    el.innerHTML = `<div class="error-box">⚠️ Search Console 取得エラー：${sc.error}</div>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${sc.period} ／ クリック数降順・上位50件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>キーワード</th>
          <th class="num">クリック</th>
          <th class="num">表示回数</th>
          <th class="num">CTR</th>
          <th class="num">平均順位</th>
        </tr>
      </thead>
      <tbody>
  `;
  sc.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td>${escHtml(r.keyword)}</td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank ${rankClass(r.position)}">${r.position}</td>
      </tr>
    `;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ③ SC ページ別
// ─────────────────────────────────────────
function renderTab3(sc) {
  const el = document.getElementById("tab3-content");
  if (sc.error) {
    el.innerHTML = `<div class="error-box">⚠️ Search Console 取得エラー：${sc.error}</div>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${sc.period} ／ クリック数降順・上位50件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>URL</th>
          <th class="num">クリック</th>
          <th class="num">表示回数</th>
          <th class="num">CTR</th>
          <th class="num">平均順位</th>
        </tr>
      </thead>
      <tbody>
  `;
  sc.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td class="url-cell"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.path)}</a></td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank ${rankClass(r.position)}">${r.position}</td>
      </tr>
    `;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// XSS対策
// ─────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ─────────────────────────────────────────
// タブ④ ページ別詳細（インデックス状態付き）
// ─────────────────────────────────────────
function renderTab4(sc) {
  const el = document.getElementById("tab4-content");
  if (sc.error) {
    el.innerHTML = `<div class="error-box">⚠️ エラー：${sc.error}</div>`;
    return;
  }
  function indexBadge(state) {
    if (!state || state === "不明" || state === "取得エラー") {
      return `<span class="badge badge-unknown">${escHtml(state || "不明")}</span>`;
    }
    const s = state.toLowerCase();
    if (s.includes("indexed") || s.includes("submitted and indexed")) {
      return `<span class="badge badge-ok">${escHtml(state)}</span>`;
    }
    if (s.includes("not indexed") || s.includes("excluded") || s.includes("redirect")) {
      return `<span class="badge badge-err">${escHtml(state)}</span>`;
    }
    return `<span class="badge badge-warn">${escHtml(state)}</span>`;
  }
  let html = `
    <p class="period-note">期間：${sc.period} ／ クリック数降順・上位50件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th><th>URL</th>
          <th class="num">クリック</th><th class="num">表示回数</th>
          <th class="num">CTR</th><th class="num">平均順位</th>
          <th>インデックス状態</th>
        </tr>
      </thead><tbody>
  `;
  sc.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td class="url-cell"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.path)}</a></td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank ${rankClass(r.position)}">${r.position}</td>
        <td>${indexBadge(r.index_state)}</td>
      </tr>`;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ⑤ カニバリ検出
// ─────────────────────────────────────────
function renderTab5(data) {
  const el = document.getElementById("tab5-content");
  if (data.error) {
    el.innerHTML = `<div class="error-box">⚠️ エラー：${data.error}</div>`;
    return;
  }
  if (data.rows.length === 0) {
    el.innerHTML = `<p class="period-note">カニバリゼーションは検出されませんでした。</p>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${data.period} ／ 同一KWで複数URLがランクイン（表示回数降順）／ 全${data.rows.length}件</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th><th>キーワード</th>
          <th class="num">競合URL数</th>
          <th class="num">合計クリック</th>
          <th class="num">合計表示回数</th>
          <th>競合URL詳細</th>
        </tr>
      </thead><tbody>
  `;
  data.rows.forEach((r, i) => {
    const rowId = `cannibal-${i}`;
    const pagesHtml = r.pages.map(p =>
      `<div class="cannibal-page-row">
        <span class="cp-path"><a href="${escHtml(p.url)}" target="_blank">${escHtml(p.path)}</a></span>
        <span class="cp-num">順位 ${p.position}</span>
        <span class="cp-num">クリック ${fmt(p.clicks)}</span>
        <span class="cp-num">表示 ${fmt(p.impressions)}</span>
       </div>`
    ).join("");
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td>${escHtml(r.keyword)}</td>
        <td class="num" style="color:#c62828;font-weight:700">${r.page_count}</td>
        <td class="num">${fmt(r.total_clicks)}</td>
        <td class="num">${fmt(r.total_impressions)}</td>
        <td>
          <button class="expand-btn" onclick="toggleDetail('${rowId}')">▶ 詳細を表示</button>
          <div id="${rowId}" class="cannibal-pages" style="display:none">${pagesHtml}</div>
        </td>
      </tr>`;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  const btn = el.previousElementSibling;
  if (el.style.display === "none") {
    el.style.display = "block";
    btn.textContent = "▼ 閉じる";
  } else {
    el.style.display = "none";
    btn.textContent = "▶ 詳細を表示";
  }
}

// ─────────────────────────────────────────
// タブ⑥ 2ページ目滞留KW
// ─────────────────────────────────────────
function renderTab6(data) {
  const el = document.getElementById("tab6-content");
  if (data.error) {
    el.innerHTML = `<div class="error-box">⚠️ エラー：${data.error}</div>`;
    return;
  }
  let html = `
    <p class="period-note">期間：${data.period} ／ 順位11〜20位（表示回数降順）／ ${data.rows.length}件</p>
    <p class="period-note" style="color:#f57c00">💡 これらのキーワードは内部リンク強化・コンテンツ改善で1ページ目に上がりやすいです</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th><th>キーワード</th><th>URL</th>
          <th class="num">クリック</th><th class="num">表示回数</th>
          <th class="num">CTR</th><th class="num">現在順位</th>
        </tr>
      </thead><tbody>
  `;
  data.rows.forEach((r, i) => {
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td>${escHtml(r.keyword)}</td>
        <td class="url-cell"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.path)}</a></td>
        <td class="num">${fmt(r.clicks)}</td>
        <td class="num">${fmt(r.impressions)}</td>
        <td class="num">${r.ctr}%</td>
        <td class="num rank rank-mid">${r.position}</td>
      </tr>`;
  });
  html += `</tbody></table>`;
  el.innerHTML = html;
}

// ─────────────────────────────────────────
// タブ⑦ 内部リンク構造
// ─────────────────────────────────────────
function renderTab7(data) {
  const el = document.getElementById("tab7-content");
  if (data.error) {
    el.innerHTML = `<div class="error-box">⚠️ エラー：${data.error}</div>`;
    return;
  }
  const maxOut = Math.max(...data.rows.map(r => r.outgoing), 1);
  let html = `
    <p class="period-note">クロール対象：${data.crawled_pages} ページ ／ 内部被リンク数降順</p>
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th><th>URL</th>
          <th class="num">内部被リンク数</th>
          <th class="num">発リンク数</th>
        </tr>
      </thead><tbody>
  `;
  data.rows.forEach((r, i) => {
    const barW = Math.round((r.outgoing / maxOut) * 50);
    html += `
      <tr>
        <td class="num" style="color:#aaa">${i + 1}</td>
        <td class="url-cell"><a href="${escHtml(r.url)}" target="_blank">${escHtml(r.path)}</a></td>
